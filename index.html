<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Green Earth</title>

    <!-- Tailwind and Daisy UI CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="bg-green-900">
      <div
        class="navbar w-full sm:w-11/12 sm:mx-auto text-white shadow-sm px-2 sm:px-5"
      >
        <!-- Left side - Logo and mobile menu -->
        <div class="navbar-start">
          <div class="dropdown">
            <div
              tabindex="0"
              role="button"
              class="btn btn-ghost lg:hidden text-white hover:bg-green-800"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-5 w-5"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M4 6h16M4 12h8m-8 6h16"
                />
              </svg>
            </div>
            <ul
              tabindex="-1"
              class="menu menu-sm dropdown-content bg-base-200 text-black font-medium rounded-box z-1 space-y-1 w-52 p-2 shadow"
            >
              <li>
                <a class="hover:bg-green-700 hover:text-white">About</a>
              </li>
              <li>
                <a class="hover:bg-green-700 hover:text-white">Gallery</a>
              </li>
              <li><a class="hover:bg-green-700 hover:text-white">Tree</a></li>
            </ul>
          </div>
          <a class="text-4xl font-bold text-white tracking-normal"
            >🌱S<span class="text-warning">H</span>T</a
          >
        </div>

        <!-- Center - Desktop menu -->
        <div class="navbar-center hidden lg:flex">
          <ul class="menu menu-horizontal px-1 gap-4 text-[18px] font-medium">
            <li>
              <a class="text-white hover:bg-green-800 hover:text-white"
                >About</a
              >
            </li>
            <li>
              <a class="text-white hover:bg-green-800 hover:text-white"
                >Gallery</a
              >
            </li>
            <li>
              <a class="text-white hover:bg-green-800 hover:text-white">Tree</a>
            </li>
          </ul>
        </div>

        <!-- Right side - CTA button -->
        <div class="navbar-end">
          <a
            class="btn btn-warning text-green-950 border-0 font-semibold text-base"
          >
            🌳 Plant a tree
          </a>
        </div>
      </div>
    </header>

    <main>
      <div class="hero bg-green-100">
        <div
          class="hero-content w-11/12 mx-auto grid grid-cols-1 md:grid-cols-4 gap-8 p-0 mt-10"
        >
          <!-- Left leaf -->
          <img
            src="./assets/hero-leaf1.png"
            class="hidden md:block md:col-span-1 w-full h-full object-cover object-center"
            alt="leaf decoration"
          />

          <!-- Center content -->
          <div
            class="text-center flex flex-col justify-center items-center md:col-span-2"
          >
            <h1 class="text-3xl sm:text-4xl font-bold leading-tight">
              Plant a Tree, Grow a Future
            </h1>
            <p class="my-4 text-gray-700 text-[18px]">
              Join our mission to plant 1 million trees and make the Earth
              greener for future generations.
            </p>
            <a
              class="btn btn-warning text-green-950 border-0 font-semibold text-base mb-10"
            >
              Get Involved
            </a>
          </div>

          <!-- Right leaf -->
          <img
            src="./assets/hero-leaf2.png"
            class="hidden md:block md:col-span-1 h-full object-cover object-center"
            alt="leaf decoration"
          />
        </div>
      </div>
    </main>
    <!-- JS -->
    <script src="script.js"></script>
  </body>
</html>
